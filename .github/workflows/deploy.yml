name: Deploy to Cloudflare Pages

on:
  schedule:
    - cron: "30 2 * * *"
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run pipeline
        run: python3 pipeline/pipeline.py
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ETHERSCAN_API_KEY:  ${{ secrets.ETHERSCAN_API_KEY }}

      - name: Preview data
        run: |
          echo "=== Pipeline output ==="
          python3 -c "import json; d=json.load(open('data/grades.json')); print('Coins rated:', len(d['coins']))"
          echo "=== USD Stablecoin grades ==="
          python3 -c "import json; [print(f'  {s}: {i["grade"]} ({i["score"]})') for s,i in sorted(json.load(open('data/grades.json'))['coins'].items(), key=lambda x:x[1]['score'], reverse=True)]"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: stablecoinratings
          directory: site
